<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="https://progressier.app/ny68RjxcV4sR4ewopRbm/progressier.json"/><script defer src="https://progressier.app/ny68RjxcV4sR4ewopRbm/script.js"></script> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro</title>

<meta name="theme-color" content="#001a2a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#000a14;
    color:white;
}

body{
    background: radial-gradient(circle at top,#001a2a,#000a14,#000);
    position:relative;
    z-index:0;
}

/* HEADER */
header{
    text-align:center;
    padding:14px;
    font-weight:bold;
    background:rgba(0,30,40,0.65);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,255,200,0.4);
    box-shadow:0 10px 25px rgba(0,0,0,0.6),
               0 0 20px rgba(0,170,255,0.3),
               0 0 20px rgba(0,255,170,0.2);
    text-shadow:0 0 10px #00aaff, 0 0 10px #00ffaa;
}

/* CHAT */
#chat{
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
    position:relative;
    z-index:2;
}

/* MESSAGE */
.msg{
    background:linear-gradient(145deg,#001a2a,#002b3a,#001018);
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(0,255,200,0.3);
    box-shadow:0 12px 25px rgba(0,0,0,0.7),
               0 0 15px rgba(0,170,255,0.3),
               0 0 15px rgba(0,255,170,0.2);
}

/* INPUT BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(0,20,30,0.75);
    backdrop-filter:blur(14px);
    border-top:1px solid rgba(0,255,200,0.4);
    z-index:3;
}

input{
    border:none;
    padding:12px;
    border-radius:10px;
    outline:none;
    background:#001a2a;
    color:white;
}

#name{ width:90px; }
#message{ flex:1; }

button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
    color:black;
    font-weight:bold;
    box-shadow:0 0 15px #00aaff, 0 0 15px #00ffaa;
}

/* INTRO */
#intro{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#intro h2{
    text-shadow:0 0 10px #00aaff;
}

#intro button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
    font-weight:bold;
}

/* 🌧 BLUE + GREEN RAIN (FULL BACKGROUND) */
.rain-drop{
    position:fixed;
    top:-10px;
    width:2px;
    height:20px;
    background:linear-gradient(to bottom,#00aaff,#00ff88);
    opacity:0.8;
    animation:fall linear infinite;
    z-index:-1;
    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div id="intro">
    <h2>💀 Legend Chat Pro</h2>
    <button onclick="start()">ENTER</button>
</div>

<header>💀 Legend Chat Pro 💀</header>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDTQ4_06Z3dt-c_GYgvrTmsKng7C42rS8",
  authDomain: "legendsamiam.firebaseapp.com",
  databaseURL: "https://legendsamiam-default-rtdb.firebaseio.com",
  projectId: "legendsamiam"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, "chat");

window.start = function(){
    document.getElementById("intro").style.display="none";
};

window.sendMessage = function(){
    const name = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;

    if(!message.trim()) return;

    push(chatRef,{
        name,
        message,
        time:Date.now()
    });

    document.getElementById("message").value="";
};

onChildAdded(chatRef, (snap)=>{
    const d = snap.val();

    const div = document.createElement("div");
    div.className="msg";
    div.innerHTML = `<b>${d.name}</b><br>${d.message}`;

    document.getElementById("chat").appendChild(div);
});
</script>

<script>
function createRain(){
    const drop = document.createElement("div");
    drop.className = "rain-drop";

    drop.style.left = Math.random() * window.innerWidth + "px";
    drop.style.animationDuration = (Math.random() * 2 + 1) + "s";

    document.body.appendChild(drop);

    setTimeout(()=>{
        drop.remove();
    }, 3000);
}

setInterval(createRain, 50);
</script>

</body>
</html>
