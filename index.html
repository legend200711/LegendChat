<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro - BLOOD HORROR CHAT</title>

<meta name="theme-color" content="#2a0000">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#050000;
    color:#ff2b2b;
}

/* BLOOD RAIN */
#rainCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:9999;
    pointer-events:none;
    mix-blend-mode:screen;
}

/* BLOOD GLOW */
#flameLayer{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
    background:radial-gradient(circle at bottom,
        rgba(255,0,0,0.35),
        rgba(80,0,0,0.25),
        transparent 70%);
    filter:blur(3px);
    animation:bloodPulse 2s infinite alternate;
}

@keyframes bloodPulse{
    0%{opacity:0.5; transform:scale(1);}
    100%{opacity:1; transform:scale(1.03);}
}

/* HEADER */
header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:12px;
    font-weight:bold;
    background:rgba(60,0,0,0.75);
    border-bottom:1px solid rgba(255,0,0,0.5);
    text-shadow:0 0 12px red;
}

/* ROOM SCREEN */
#roomScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.92);
    z-index:999;
}

#roomScreen input{
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid red;
    background:#120000;
    color:#ff3b3b;
    text-align:center;
}

#roomScreen button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#8b0000,#ff0000);
    color:white;
    font-weight:bold;
}

/* CHAT */
#chat{
    position:relative;
    z-index:2;
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
}

.msg{
    background:linear-gradient(145deg,#2a0000,#120000,#000000);
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(255,0,0,0.3);
    box-shadow:0 0 12px rgba(255,0,0,0.25);
}

/* INPUT BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(20,0,0,0.85);
    border-top:1px solid rgba(255,0,0,0.3);
    z-index:3;
}

input{
    border:none;
    padding:12px;
    border-radius:10px;
    outline:none;
    background:#120000;
    color:#ff3b3b;
    border:1px solid red;
}

#name{ width:90px; }
#message{ flex:1; }

button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#8b0000,#ff0000);
    color:white;
    font-weight:bold;
}

/* RIPPLE */
.ripple{
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    border:2px solid rgba(255,0,0,0.8);
    transform:translate(-50%,-50%);
    animation:ripple 0.8s ease-out forwards;
    pointer-events:none;
    z-index:9999;
}

@keyframes ripple{
    0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    100%{transform:translate(-50%,-50%) scale(10);opacity:0;}
}
</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>
<div id="flameLayer"></div>

<div id="roomScreen">
    <h2>💀 Enter the Blood Room</h2>

    <input id="roomInput" placeholder="ROOM123">
    <input id="nameInput" placeholder="Your Name">

    <button onclick="joinRoom()">Enter Room</button>
    <button onclick="joinLobby()">Enter Lobby</button>
</div>

<header id="roomTitle">🩸 BLOOD HORROR CHAT</header>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDTQ4_06Z3dt-c_GYgvrTmsKng7C42rS8",
  authDomain: "legendsamiam.firebaseapp.com",
  databaseURL: "https://legendsamiam-default-rtdb.firebaseio.com",
  projectId: "legendsamiam",
  storageBucket: "legendsamiam.firebasestorage.app",
  messagingSenderId: "770205565259",
  appId: "1:770205565259:web:c49a750cc2ceba041228ce"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let chatRef = null;
let lastMessageTime = Date.now();
let chatTimer = null;

/* ROOM */
window.joinRoom = function(){
    const room = document.getElementById("roomInput").value.trim().toUpperCase();
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    if(!room) return;
    enterRoom(room, name);
};

window.joinLobby = function(){
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    enterRoom("LOBBY", name);
};

function enterRoom(room, name){

    document.getElementById("roomScreen").style.display = "none";
    document.getElementById("name").value = name;

    document.getElementById("roomTitle").innerText = "🩸 Room: " + room;

    document.getElementById("chat").innerHTML = "";

    chatRef = ref(db, "rooms/" + room + "/messages");

    listenMessages();
    startChatAutoClear();
}

/* LISTEN */
function listenMessages(){
    onChildAdded(chatRef, (snap)=>{
        const d = snap.val();

        lastMessageTime = Date.now();

        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.name}</b><br>${d.message}`;

        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = 999999;
    });
}

/* SEND */
window.sendMessage = function(){

    if(!chatRef) return;

    const name = document.getElementById("name").value.trim() || "Ghost";
    const message = document.getElementById("message").value.trim();

    if(!message) return;

    push(chatRef,{
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

/* 💀 CHAT AUTO CLEAR ONLY */
function startChatAutoClear(){

    if(chatTimer) clearInterval(chatTimer);

    chatTimer = setInterval(()=>{

        const now = Date.now();
        const fiveMin = 5 * 60 * 1000;

        if(now - lastMessageTime > fiveMin){

            document.getElementById("chat").innerHTML = "";

            console.log("💀 Chat cleared (UI only)");
        }

    }, 10000);
}

/* BLOOD RAIN */
const canvas = document.getElementById("rainCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

let drops = [];
for(let i=0;i<180;i++){
    drops.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        len:Math.random()*25+10,
        speed:Math.random()*7+4
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle="rgba(255,0,0,0.6)";

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x,d.y+d.len);
        ctx.stroke();

        d.y+=d.speed;

        if(d.y>canvas.height){
            d.y=0;
            d.x=Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(draw);
}
draw();

/* RIPPLE */
document.addEventListener("click",(e)=>{
    const r=document.createElement("div");
    r.className="ripple";
    r.style.left=e.clientX+"px";
    r.style.top=e.clientY+"px";
    document.body.appendChild(r);
    setTimeout(()=>r.remove(),800);
});
</script>

</body>
</html>
