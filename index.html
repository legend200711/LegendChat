<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro - HAUNTED FIREBASE MODE</title>

<meta name="theme-color" content="#0a0000">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#000;
    color:#ffdddd;
}

/* 🩸 HORROR BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,0,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(150,0,0,0.10), transparent 45%),
        linear-gradient(#000, #050000);
    z-index:-3;
}

/* 📺 VHS FLICKER */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(0,0,0,0.02) 2px
    );
    animation:flicker 0.12s infinite;
    mix-blend-mode:overlay;
    z-index:9998;
    pointer-events:none;
}

@keyframes flicker{
    0%{opacity:0.9;}
    50%{opacity:0.6;}
    100%{opacity:0.95;}
}

/* 🌧️ RAIN */
#rainCanvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:9997;
    pointer-events:none;
    opacity:0.7;
}

/* HEADER */
header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:12px;
    font-weight:bold;
    background:rgba(40,0,0,0.7);
    border-bottom:1px solid rgba(255,0,0,0.3);
    text-shadow:0 0 10px red;
}

/* ROOM SCREEN */
#roomScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.95);
    z-index:999;
}

#roomScreen input{
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid rgba(255,0,0,0.3);
    background:#120000;
    color:white;
    text-align:center;
}

/* CHAT */
#chat{
    position:relative;
    z-index:2;
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
}

/* MESSAGE */
.msg{
    background:linear-gradient(145deg,#1a0000,#000);
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
    border:1px solid rgba(255,0,0,0.2);
    animation:pop 0.3s ease;
}

@keyframes pop{
    from{transform:translateY(10px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* INPUT BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(20,0,0,0.85);
    border-top:1px solid rgba(255,0,0,0.3);
    z-index:3;
}

input{
    border:none;
    padding:12px;
    border-radius:10px;
    background:#120000;
    color:white;
}

#name{width:90px;}
#message{flex:1;}
button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#550000,#ff0000);
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<canvas id="rainCanvas"></canvas>

<div id="roomScreen">
    <h2>💀 ENTER HAUNTED ROOM</h2>
    <input id="roomInput" placeholder="ROOM CODE">
    <input id="nameInput" placeholder="NAME">
    <button onclick="joinRoom()">Join Room</button>
    <button onclick="joinLobby()">Enter Lobby</button>
</div>

<header id="roomTitle">💀 LEGEND HAUNTED CHAT</header>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, query, orderByChild, startAt, remove }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDTQ4_06Z3dt-c_GYgvrTmsKng7C42rS8",
  authDomain: "legendsamiam.firebaseapp.com",
  databaseURL: "https://legendsamiam-default-rtdb.firebaseio.com",
  projectId: "legendsamiam",
  storageBucket: "legendsamiam.firebasestorage.app",
  messagingSenderId: "770205565259",
  appId: "1:770205565259:web:c49a750cc2ceba041228ce"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let chatRef;
let currentRoom;

/* ROOM SYSTEM */
window.joinRoom = function(){
    const room = document.getElementById("roomInput").value.trim().toUpperCase();
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    if(!room) return;
    enterRoom(room, name);
};

window.joinLobby = function(){
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    enterRoom("LOBBY", name);
};

function enterRoom(room, name){
    currentRoom = room;

    document.getElementById("roomScreen").style.display = "none";
    document.getElementById("name").value = name;

    document.getElementById("roomTitle").innerText =
        "💀 ROOM: " + room + " — IT REMEMBERS YOU (10 MIN ONLY)";

    document.getElementById("chat").innerHTML = "";

    chatRef = ref(db, "rooms/" + room + "/messages");

    listenMessages();
    startAutoCleanup();
}

/* 💬 LISTEN */
function listenMessages(){
    onChildAdded(chatRef, (snap)=>{
        const d = snap.val();

        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.name}</b><br>${d.message}`;

        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = 999999;
    });
}

/* 📤 SEND */
window.sendMessage = function(){
    if(!chatRef) return;

    const name = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;

    if(!message.trim()) return;

    push(chatRef,{
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

/* ⏳ AUTO DELETE (10 MIN CLEANUP LOOP) */
function startAutoCleanup(){
    setInterval(async () => {
        const cutoff = Date.now() - 10 * 60 * 1000;

        const snapshot = await fetch(
            `${firebaseConfig.databaseURL}/rooms/${currentRoom}/messages.json`
        ).then(r => r.json());

        if(!snapshot) return;

        for(const key in snapshot){
            const msg = snapshot[key];
            if(msg.time && msg.time < cutoff){
                await fetch(
                    `${firebaseConfig.databaseURL}/rooms/${currentRoom}/messages/${key}.json`,
                    { method: "DELETE" }
                );
            }
        }
    }, 30000); // every 30 seconds
}
</script>

</body>
</html>
