<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Legend Chat Pro - Rooms</title>

<meta name="theme-color" content="#001a2a">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial;
    background:#000a14;
    color:white;
}

/* 🌧️ BLUE RAIN CANVAS */
#rainCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* 🔥 BLUE FLAME GLOW */
#flameLayer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:40%;
    pointer-events:none;
    z-index:1;
    background:radial-gradient(circle at bottom,
        rgba(0,180,255,0.25),
        rgba(0,80,255,0.08),
        transparent 70%);
    filter:blur(2px);
    animation:flameFlicker 2s infinite alternate;
}

@keyframes flameFlicker{
    0%{opacity:0.6; transform:scale(1);}
    100%{opacity:1; transform:scale(1.02);}
}

header{
    position:relative;
    z-index:2;
    text-align:center;
    padding:12px;
    font-weight:bold;
    background:rgba(0,30,40,0.7);
    border-bottom:1px solid rgba(0,255,200,0.4);
}

#roomScreen{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    z-index:999;
}

#roomScreen input{
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:10px;
    background:#001a2a;
    color:white;
    text-align:center;
}

#roomScreen button{
    margin-top:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
    font-weight:bold;
}

#chat{
    position:relative;
    z-index:2;
    height:calc(100vh - 140px);
    overflow-y:auto;
    padding:12px;
}

.msg{
    background:linear-gradient(145deg,#001a2a,#002b3a,#001018);
    padding:12px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid rgba(0,180,255,0.2);
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    padding:10px;
    background:rgba(0,20,30,0.75);
    z-index:3;
}

input{
    border:none;
    padding:12px;
    border-radius:10px;
    outline:none;
    background:#001a2a;
    color:white;
}

#name{ width:90px; }
#message{ flex:1; }

button{
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00aaff,#00ffaa);
    font-weight:bold;
}
</style>
</head>

<body>

<!-- 🌧️ RAIN + 🔥 FLAME LAYERS -->
<canvas id="rainCanvas"></canvas>
<div id="flameLayer"></div>

<!-- ROOM SCREEN -->
<div id="roomScreen">
    <h2>💀 Enter Room Code</h2>

    <input id="roomInput" placeholder="ROOM123">
    <input id="nameInput" placeholder="Your Name">

    <button onclick="joinRoom()">Join Room</button>
    <button onclick="joinLobby()">Enter Lobby (Public Chat)</button>
</div>

<header id="roomTitle">💀 Legend Chat Pro 💀</header>

<div id="chat"></div>

<div class="bottom">
    <input id="name" placeholder="Name">
    <input id="message" placeholder="Message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBDTQ4_06Z3dt-c_GYgvrTmsKng7C42rS8",
  authDomain: "legendsamiam.firebaseapp.com",
  databaseURL: "https://legendsamiam-default-rtdb.firebaseio.com",
  projectId: "legendsamiam",
  storageBucket: "legendsamiam.firebasestorage.app",
  messagingSenderId: "770205565259",
  appId: "1:770205565259:web:c49a750cc2ceba041228ce"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentRoom = null;
let chatRef = null;

/* JOIN ROOM */
window.joinRoom = function(){
    const room = document.getElementById("roomInput").value.trim().toUpperCase();
    const name = document.getElementById("nameInput").value.trim() || "Ghost";

    if(!room) return;

    enterRoom(room, name);
};

window.joinLobby = function(){
    const name = document.getElementById("nameInput").value.trim() || "Ghost";
    enterRoom("LOBBY", name);
};

function clearRoom(room){
    const roomRef = ref(db, "rooms/" + room + "/messages");
    remove(roomRef);
}

function enterRoom(room, name){
    currentRoom = room;

    document.getElementById("roomScreen").style.display = "none";
    document.getElementById("name").value = name;

    document.getElementById("roomTitle").innerText = "💀 Room: " + room;

    document.getElementById("chat").innerHTML = "";

    chatRef = ref(db, "rooms/" + room + "/messages");

    clearRoom(room);
    listenMessages();
}

function listenMessages(){
    onChildAdded(chatRef, (snap)=>{
        const d = snap.val();

        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<b>${d.name}</b><br>${d.message}`;

        document.getElementById("chat").appendChild(div);
        document.getElementById("chat").scrollTop = 999999;
    });
}

window.sendMessage = function(){
    if(!chatRef) return;

    const name = document.getElementById("name").value || "Ghost";
    const message = document.getElementById("message").value;

    if(!message.trim()) return;

    push(chatRef,{
        name,
        message,
        time: Date.now()
    });

    document.getElementById("message").value = "";
};

/* 🌧️ BLUE RAIN EFFECT */
const canvas = document.getElementById("rainCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drops = [];

for(let i=0;i<120;i++){
    drops.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        len: Math.random()*20+10,
        speed: Math.random()*4+4
    });
}

function drawRain(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "rgba(0,170,255,0.5)";
    ctx.lineWidth = 1;

    for(let d of drops){
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.len);
        ctx.stroke();

        d.y += d.speed;

        if(d.y > canvas.height){
            d.y = -20;
            d.x = Math.random()*canvas.width;
        }
    }

    requestAnimationFrame(drawRain);
}

drawRain();
</script>

</body>
</html>
